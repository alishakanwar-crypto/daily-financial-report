<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unsubscribe – Daily Market Pulse</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8fafc; display: flex; justify-content: center; align-items: center;
    min-height: 100vh; margin: 0;
  }
  .card {
    background: #fff; border-radius: 12px; padding: 40px;
    max-width: 420px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-align: center;
  }
  h2 { font-size: 20px; margin-bottom: 8px; color: #1e293b; }
  p { color: #64748b; font-size: 14px; margin-bottom: 20px; }
  input[type="email"] {
    width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0;
    border-radius: 6px; font-size: 14px; margin-bottom: 12px;
  }
  button {
    width: 100%; padding: 12px; background: #dc2626; color: #fff;
    border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #b91c1c; }
</style>
</head>
<body>
<div class="card">
  <h2>Unsubscribe</h2>
  <p>Enter your email to stop receiving the Daily Market Pulse report.</p>
  <form method="post" action="/unsubscribe">
    <input type="email" name="email" placeholder="Your email address" value="{{ email }}" required>
    <button type="submit">Unsubscribe</button>
  </form>
</div>
</body>
</html>
