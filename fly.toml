app = "daily-market-pulse"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[env]
  REPORT_HOUR_IST = "7"
  REPORT_MINUTE_IST = "0"
  TIMEZONE = "Asia/Kolkata"
  DB_PATH = "/app/data/app.db"

[mounts]
  source = "data"
  destination = "/app/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
